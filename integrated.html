<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetics: Integrated Rate Laws</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --error: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h1 { color: var(--primary); text-align: center; }
        
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .table-area { flex: 1; min-width: 250px; }
        .graph-area { flex: 2; min-width: 350px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .gen-btn { background: var(--primary); color: white; width: 100%; margin-bottom: 20px; padding: 15px; }
        .plot-btn { background: #ecf0f1; color: var(--primary); border: 1px solid var(--primary); }
        .plot-btn:hover { background: var(--primary); color: white; }
        .ans-btn { background: var(--error); color: white; }

        .question-section { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--accent); width: 100%; box-sizing: border-box; }
        .reveal-area { margin-top: 10px; color: var(--error); font-weight: bold; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h1>Integrated Rate Law Analysis</h1>
    <button class="gen-btn" onclick="generateData()">Generate New Data Set</button>

    <div class="container">
        <div class="table-area">
            <div id="data-table"></div>
            <p><i>Graph the data to determine the reaction order.</i></p>
            <div class="btn-group">
                <button class="plot-btn" onclick="plot('normal')">[A] vs t</button>
                <button class="plot-btn" onclick="plot('ln')">ln[A] vs t</button>
                <button class="plot-btn" onclick="plot('inv')">1/[A] vs t</button>
            </div>
        </div>
        <div class="graph-area">
            <canvas id="kineticsChart"></canvas>
        </div>
    </div>

    <div id="questions" style="display:none; width: 100%;">
    <div class="question-section">
        <strong>1. Determine the order and the Rate Constant (k).</strong><br>
        <button class="ans-btn" onclick="toggleAns('ans1')">Check Order & k</button>
        <div id="ans1" class="reveal-area"></div>
    </div>

    <div class="question-section">
        <strong>2. Concentration Prediction.</strong><br>
        <div id="q2-text"></div>
        <button class="ans-btn" onclick="toggleAns('ans2')">Check Concentration</button>
        <div id="ans2" class="reveal-area"></div>
    </div>

    <div class="question-section">
        <strong>3. Time Prediction.</strong><br>
        <div id="q3-text"></div>
        <button class="ans-btn" onclick="toggleAns('ans3')">Check Time</button>
        <div id="ans3" class="reveal-area"></div>
    </div>
</div>
<hr style="margin-top: 40px; border: 0; border-top: 1px solid #ddd;">
<div style="text-align: center; margin-top: 20px;">
    <a href="index.html" style="
        display: inline-block;
        padding: 12px 25px;
        background-color: #34495e;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;"
        onmouseover="this.style.backgroundColor='#2c3e50'"
        onmouseout="this.style.backgroundColor='#34495e'">
        ← Back to Initial Rates Practice
    </a>
</div>
</div>

<script>
    let chart;
    let currentData = [];
    let secretOrder = 1;
    let secretK = 0;
    let initialA = 0;

    function generateData() {
        function generateData() {
        // --- ADD THESE LINES TO CLEAR PREVIOUS ANSWERS ---
        document.querySelectorAll('.reveal-area').forEach(el => {
            el.style.display = 'none'; // Hide the red text
            el.innerText = '';         // Clear the old text
        });
        // -------------------------------------------------

        secretOrder = Math.random() > 0.5 ? 1 : 2;
        // ... (the rest of your existing code)
        secretOrder = Math.random() > 0.5 ? 1 : 2;
        // Adjust K values so the reaction isn't too fast or too slow
        secretK = secretOrder === 1 ? parseFloat((Math.random() * 0.005 + 0.002).toFixed(5)) : parseFloat((Math.random() * 0.5 + 0.1).toFixed(3));
        initialA = parseFloat((Math.random() * 0.5 + 0.5).toFixed(2));
        
        currentData = [];
        let times = [0, 100, 200, 300, 400, 500];
        
        let tableHtml = `<table><tr><th>Time (s)</th><th>[A] (M)</th></tr>`;
        
        times.forEach(t => {
            let conc;
            if (secretOrder === 1) {
                conc = initialA * Math.exp(-secretK * t);
            } else {
                conc = 1 / (secretK * t + (1 / initialA));
            }
            currentData.push({ t, a: conc });
            tableHtml += `<tr><td>${t}</td><td>${conc.toFixed(4)}</td></tr>`;
        });
        tableHtml += `</table>`;
        document.getElementById('data-table').innerHTML = tableHtml;

        // --- Question 1: Order and K ---
        let unitText = secretOrder === 1 ? "s⁻¹" : "M⁻¹s⁻¹";
        let orderText = secretOrder === 1 ? "1st Order (Linear ln[A] vs t)" : "2nd Order (Linear 1/[A] vs t)";
        document.getElementById('ans1').innerHTML = `Order: ${orderText}\nk = ${Math.abs(secretK)} ${unitText}`;

        // --- Question 2: Concentration at a future time ---
        let futureTime = 750; 
        let futureConc;
        if (secretOrder === 1) {
            futureConc = initialA * Math.exp(-secretK * futureTime);
        } else {
            futureConc = 1 / (secretK * futureTime + (1 / initialA));
        }
        document.getElementById('q2-text').innerHTML = `What will the concentration be at <b>t = ${futureTime} s</b>?`;
        document.getElementById('ans2').innerText = `[A]ₜ = ${futureConc.toPrecision(4)} M`;

        // --- Question 3: Time to reach a specific concentration ---
        let targetConc = (initialA * 0.15).toFixed(3); 
        let timeNeeded;
        if (secretOrder === 1) {
            timeNeeded = -Math.log(targetConc / initialA) / secretK;
        } else {
            timeNeeded = (1 / targetConc - 1 / initialA) / secretK;
        }
        document.getElementById('q3-text').innerHTML = `How many seconds will it take for the concentration to drop to <b>${targetConc} M</b>?`;
        document.getElementById('ans3').innerText = `Time = ${timeNeeded.toFixed(1)} seconds`;

        // Show the question area and refresh the graph
        document.getElementById('questions').style.display = 'block';
        if (chart) chart.destroy();
        plot('normal'); // Start by showing the standard [A] vs t curve
    }

    function plot(type) {
        const ctx = document.getElementById('kineticsChart').getContext('2d');
        if (chart) chart.destroy();

        let label = "[A]";
        let plotData = currentData.map(d => ({ x: d.t, y: d.a }));

        if (type === 'ln') {
            label = "ln[A]";
            plotData = currentData.map(d => ({ x: d.t, y: Math.log(d.a) }));
        } else if (type === 'inv') {
            label = "1/[A]";
            plotData = currentData.map(d => ({ x: d.t, y: 1/d.a }));
        }

        chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: label,
                    data: plotData,
                    showLine: true,
                    borderColor: '#2c3e50',
                    backgroundColor: '#e67e22'
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Time (s)' } },
                    y: { title: { display: true, text: label } }
                }
            }
        });
    }

    function toggleAns(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }
</script>

</body>
</html>
